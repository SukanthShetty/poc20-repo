name: Build and Push Docker Image
 
on:
  push:
    branches:
      - main
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
 
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
 
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/poc20:${{ github.run_number }} .
 
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/poc20:${{ github.run_number }}
 
    - name: Tag Latest
      run: |
        docker tag ${{ secrets.DOCKER_USERNAME }}/poc20:${{ github.run_number }} ${{ secrets.DOCKER_USERNAME }}/poc21:latest
 
    - name: Push Latest
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/poc20:latest
